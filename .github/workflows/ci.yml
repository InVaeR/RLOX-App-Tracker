name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt
      - name: Ruff check
        run: ruff check app/src/ app/tests/
      - name: Ruff format check
        run: ruff format --check app/src/ app/tests/

  test:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt
      - name: Run tests
        run: python -m pytest app/tests/ -v
      - name: Build launcher
        run: dotnet build launcher/src/RLOXLauncher/RLOXLauncher.csproj
      - name: Run launcher tests
        run: dotnet test launcher/tests/RLOXLauncher.Tests.csproj --verbosity normal
      - name: Build app (PyInstaller)
        run: pyinstaller app/RLOXAppTracker.spec --clean --noconfirm

      - name: Publish launcher
        run: |
          dotnet publish launcher/src/RLOXLauncher/RLOXLauncher.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist/launcher `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found"
          }

          & $iscc `
            "/DAppVersion=2.0.4" `
            "/DAppVersionNumeric=2.0.4.0" `
            "installer/RLOXAppTracker.iss"

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }
