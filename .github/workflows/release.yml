name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace "^v", ""
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          # Numeric version for Windows file version (major.minor.patch.build)
          $parts = $ver -split '-'
          $base = $parts[0]
          if ($parts.Length -gt 1 -and $parts[1] -match 'alpha\.(\d+)') {
            $numVer = "$base.$($matches[1])"
          } elseif ($parts.Length -gt 1 -and $parts[1] -match 'beta\.(\d+)') {
            $numVer = "$base.$($matches[1])"
          } else {
            $numVer = "$base.0"
          }
          echo "version_numeric=$numVer" >> $env:GITHUB_OUTPUT

      - name: Check tag matches version.py
        run: |
          $ver = (python -c "exec(open('app/src/rlox_app_tracker/version.py').read()); print(__version_base__)")
          if ("v$ver" -ne "${{ github.ref_name }}") {
            Write-Error "Tag mismatch: release tag ${{ github.ref_name }} != version.py v$ver"
            exit 1
          }

      - name: Determine prerelease status
        id: channel
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '-alpha') {
            echo "prerelease=true" >> $env:GITHUB_OUTPUT
          } elseif ($tag -match '-beta') {
            echo "prerelease=true" >> $env:GITHUB_OUTPUT
          } elseif ($tag -match '-rc') {
            echo "prerelease=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "prerelease=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt

      - name: Ruff checks
        run: |
          ruff check app/src/ app/tests/
          ruff format --check app/src/ app/tests/

      - name: Run Python tests
        run: python -m pytest app/tests/ -v

      - name: Build app
        run: |
          pyinstaller app/RLOXAppTracker.spec --noconfirm

      - name: Smoke test
        run: |
          if (-not (Test-Path "dist/RLOXAppTracker/RLOXAppTracker.exe")) {
            Write-Error "EXE not found"
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run launcher tests
        run: dotnet test launcher/tests/RLOXLauncher.Tests.csproj --verbosity normal

      - name: Build launcher
        run: |
          dotnet publish launcher/src/RLOXLauncher/RLOXLauncher.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output dist/launcher `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Build installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "Inno Setup 6 not found — installer build required for release"
            exit 1
          }
          & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" "/DAppVersionNumeric=${{ steps.version.outputs.version_numeric }}" installer/RLOXAppTracker.iss

      - name: Generate SHA-256
        run: |
          $setup = Get-ChildItem -Path dist -Filter "RLOX-App-Tracker-Setup-*.exe" | Select-Object -First 1
          if ($setup) {
            $hash = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash.ToLower()
            $hash | Out-File -FilePath "dist/SHA256SUMS.txt" -Encoding utf8
            Write-Host "SHA256: $hash"
          }

      - name: Generate manifest
        run: |
          $setup = Get-ChildItem -Path dist -Filter "RLOX-App-Tracker-Setup-*.exe" | Select-Object -First 1
          if ($setup) {
            python build/generate_manifest.py $setup.FullName "${{ steps.version.outputs.version }}"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ steps.channel.outputs.prerelease }}
          files: |
            dist/RLOX-App-Tracker-Setup-*.exe
            dist/SHA256SUMS.txt
            release/latest.json
